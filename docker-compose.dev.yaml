name: factorymind-dev

services:
  api:
    build: ./apps/api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ./apps/api:/app
    environment:
      ENVIRONMENT: dev
      HF_USE_MOCK: "true"
      DATABASE_URL: postgresql+asyncpg://factory:factory@postgres:5432/factorymind
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["8000:8000"]
    depends_on: [postgres, redis, qdrant, neo4j, kafka]

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

  worker:
    build: ./apps/api
    command: celery -A src.workers.celery_app worker --beat --loglevel=info
    working_dir: /app
    volumes:
      - ./apps/api:/app
    environment:
      REDIS_URL: redis://redis:6379/0
      HF_USE_MOCK: "true"
    depends_on: [redis, api]

  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factorymind
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrantdata:/qdrant/storage"]

  neo4j:
    image: neo4j:5.25
    environment:
      NEO4J_AUTH: neo4j/password
    ports: ["7474:7474", "7687:7687"]

  kafka:
    image: bitnami/kafka:3.6
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["9092:9092"]

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://factory:factory@postgres:5432/langfuse
      NEXTAUTH_SECRET: dev-secret
      SALT: dev-salt
      NEXTAUTH_URL: http://localhost:3001
    ports: ["3001:3000"]
    depends_on: [postgres]

  opcua-sim:
    image: mcr.microsoft.com/iotedge/opc-plc:latest
    command: --unsecuretransport --autoaccept --sph
    ports: ["50000:50000"]

volumes:
  pgdata:
  qdrantdata:
