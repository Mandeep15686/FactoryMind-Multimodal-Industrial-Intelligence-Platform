apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: factorymind
  annotations:
    kubernetes.io/ingress.class: "kong"
    konghq.com/strip-path: "false"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts: ["api.factorymind.ai", "app.factorymind.ai"]
      secretName: factorymind-tls
  rules:
    - host: api.factorymind.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: factorymind-api
                port: { number: 80 }
    - host: app.factorymind.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: factorymind-web
                port: { number: 3000 }
---
# Canary routing (10% traffic) for new model/prompt versions.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: factorymind-canary
  annotations:
    kubernetes.io/ingress.class: "kong"
    konghq.com/plugins: "canary-10"
spec:
  rules:
    - host: api.factorymind.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: factorymind-api-canary
                port: { number: 80 }
