apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
spec:
  serviceName: qdrant
  replicas: 3
  selector:
    matchLabels: { app: qdrant }
  template:
    metadata:
      labels: { app: qdrant }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.1
          ports:
            - { containerPort: 6333, name: http }
            - { containerPort: 6334, name: grpc }
          volumeMounts:
            - { name: storage, mountPath: /qdrant/storage }
          resources:
            requests: { cpu: "1", memory: "2Gi" }
            limits: { cpu: "2", memory: "8Gi" }
  volumeClaimTemplates:
    - metadata: { name: storage }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 50Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
spec:
  clusterIP: None
  selector: { app: qdrant }
  ports:
    - { port: 6333, name: http }
    - { port: 6334, name: grpc }
